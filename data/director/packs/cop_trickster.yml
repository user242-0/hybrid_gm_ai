actions:
  hide_evidence:
    label: "証拠を隠す"
    description: "目立つ痕跡を片づけ、追跡の手掛かりを減らす。"
    time_min: 6
    emotion_delta:
      R: -2
      G: 3
      B: 1
    effects:
      - op: add
        path: suspicion.value
        value: -1
        min: 0
    tags:
      - flee
      - concealment
    ui_visible: false
    heart:
      axis: green
      value: 70
  plant_false_trace:
    label: "偽の痕跡を残す"
    description: "追跡の焦点をずらすため、矛盾する痕跡を残す。"
    time_min: 8
    emotion_delta:
      R: 1
      G: 2
      B: 1
    effects:
      - op: add
        path: false_traces
        value: 1
    tags:
      - flee
      - deception
    ui_visible: false
    heart:
      axis: green
      value: 80
  avoid_witness:
    label: "目撃者を避ける"
    description: "人目の少ない経路を選び、接触を避ける。"
    time_min: 5
    emotion_delta:
      R: -2
      G: 3
      B: 0
    effects:
      - op: add
        path: witnesses_avoided
        value: 1
      - op: add
        path: suspicion.value
        value: -1
        min: 0
    tags:
      - flee
      - evasion
    ui_visible: false
    heart:
      axis: green
      value: 70
  change_hideout:
    label: "潜伏先を変える"
    description: "追跡を避けるため、別の潜伏先へ移る。"
    time_min: 12
    emotion_delta:
      R: -1
      G: 4
      B: 0
    effects:
      - op: add
        path: hideout_changes
        value: 1
      - op: add
        path: suspicion.value
        value: -1
        min: 0
    tags:
      - flee
      - hideout
    ui_visible: false
    heart:
      axis: green
      value: 90
  observe_next_target:
    label: "次の標的を観察する"
    description: "距離を保ったまま周囲の動きと状況を観察する。"
    time_min: 7
    emotion_delta:
      R: 1
      G: 1
      B: 3
    effects:
      - op: add
        path: target_observations
        value: 1
    tags:
      - flee
      - observation
    ui_visible: false
    heart:
      axis: blue
      value: 80
hud_actions:
  actors:
    刑事:
      - FREEZE
      - PURSUE
      - WITNESS
    愉快犯:
      - FLEE
modes:
  FLEE:
    goals:
      -
        condition: 'clock >= Day2 06:00'
        id: escape_dawn
        type: Reach
      -
        condition: suspicion.value < 7 for 2d
        id: low_profile
        type: Maintain
    micro:
      -
        action: hide_evidence
        done: suspicion.value <= 4
        text: 証拠を隠す
        time_min: 6
      -
        action: plant_false_trace
        done: false_traces >= 1
        text: 偽の痕跡を残す
        time_min: 8
      -
        action: avoid_witness
        done: witnesses_avoided >= 1
        text: 目撃者を避ける
        time_min: 5
      -
        action: change_hideout
        done: hideout_changes >= 1
        text: 潜伏先を変える
        time_min: 12
      -
        action: observe_next_target
        done: target_observations >= 1
        text: 次の標的を観察する
        time_min: 7
      -
        action: move_low_profile
        done: suspicion.value <= 2
        text: 裏路地→高架下→駅裏へ移動
        time_min: 8
      -
        action: mark_avoid_shop
        done: avoid_tags >= 1
        text: 顔を見られた店を避ける（タグ付け）
        time_min: 2
  FREEZE:
    goals:
      -
        condition: entropy.value < 12 for 3d
        id: keep_job
        type: Avoid
      -
        condition: victim_names_logged >= 3
        id: witness_log
        type: Meaning
    micro:
      -
        action: check_tip
        done: tips_checked >= 1
        text: 未読の通報を1件だけ確認
        time_min: 5
      -
        action: limit_drink
        done: sobriety_days >= 1
        text: 本日の酒量を規定以下にする
        time_min: 10
      -
        action: log_victim
        done: victim_names_logged >= 1
        text: 被害者の名前をノートに1人追記
        time_min: 3
      -
        action: rest
        text: 休む
        time_min: 10
  PURSUE:
    goals:
      -
        condition: evidence_score >= 100
        id: arrest
        type: Reach
      -
        condition: witness_value >= 3
        id: witness
        type: Meaning
    micro:
      -
        action: collect_fiber
        done: evidence_score >= 10
        text: 現場で青い繊維を1点採取
        time_min: 15
      -
        action: fix_cam_clock
        done: cams_fixed >= 1
        text: 監視カメラの時刻ズレを補正
        time_min: 12
      -
        action: call_partner
        done: partner_calls >= 1
        text: 元相棒に5分だけ電話
        time_min: 5
  WITNESS:
    goals:
      -
        condition: report_submitted >= 1
        id: truth_told
        type: Meaning
    micro:
      -
        action: file_report
        done: report_submitted >= 1
        text: 真実を1項だけ報告書に残す
        time_min: 7
modes_enabled:
  - FREEZE
  - FLEE
  - PURSUE
  - WITNESS
roles:
  protagonist:
    name: "刑事"
    archetype: cop
    state: burned_out
  antagonist:
    name: "愉快犯"
    archetype: trickster_killer
    state: at_large
locations:
  default: "拠点_安アパート"
  available:
    - "拠点_安アパート"
    - "事件現場_路地裏"
    - "情報源_夜の酒場"
    - "警察署_控室"
targets:
  default: "愉快犯"
seed: 41
title: 落魄の刑事 vs 愉快犯
tone:
  - neo-noir
  - slow_burn
world_defaults:
  actor_locations:
    刑事: "警察署_控室"
    愉快犯: "事件現場_路地裏"
  actor_discoveries:
    刑事: []
    愉快犯: []
  actor_micro_goals: {}
  actor_modes:
    刑事: FREEZE
    愉快犯: FLEE
  avoid_tags: 0
  cams_fixed: 0
  clock: 0
  entropy:
    value: 0
  evidence_score: 0
  false_traces: 0
  flags:
    tips_unread_exists: true
    crime_scene_blue_fiber_exists: true
    camera_clock_skew_exists: true
    partner_contact_available: true
    exposed_routes_exist: true
  harm:
    threshold_warn: 20
    value: 0
  hideout_changes: 0
  partner_calls: 0
  report_submitted: 0
  sobriety_days: 0
  suspicion:
    value: 5
  target_observations: 0
  tips_checked: 0
  victim_names_logged: 0
  witness_value: 0
  witnesses_avoided: 0
affordances:
  canonical_facts:
    tips_unread_exists: true
    crime_scene_blue_fiber_exists: true
    camera_clock_skew_exists: true
    partner_contact_available: true
    exposed_routes_exist: true
  discovery_rules:
    - id: dr_blue_fiber
      creates_discovery: blue_fiber_spotted
      trigger_type: action_result
      trigger_action: examine_scene
      requires_facts:
        - crime_scene_blue_fiber_exists
    - id: dr_cam_clock_skew
      creates_discovery: camera_skew_noticed
      trigger_type: action_result
      trigger_action: review_footage
      requires_facts:
        - camera_clock_skew_exists
    - id: dr_partner_contact
      creates_discovery: need_partner_help_realized
      trigger_type: director_inject
      requires_facts:
        - partner_contact_available
    - id: dr_unsafe_route
      creates_discovery: unsafe_route_identified
      trigger_type: director_inject
      requires_facts:
        - exposed_routes_exist
  opportunity_rules:
    - id: or_collect_fiber
      action_id: collect_fiber
      label: "青い繊維片を採取する"
      requires_discoveries:
        - blue_fiber_spotted
      opportunity_kind: standard
      visible_when:
        current_location: "事件現場_路地裏"
        director_mode: PURSUE
    - id: or_fix_cam_clock
      action_id: fix_cam_clock
      label: "カメラの時刻ずれを補正する"
      requires_discoveries:
        - camera_skew_noticed
      opportunity_kind: standard
      visible_when:
        current_location: "事件現場_路地裏"
        director_mode: PURSUE
    - id: or_call_partner
      action_id: call_partner
      label: "相棒に電話する"
      requires_discoveries:
        - need_partner_help_realized
      opportunity_kind: standard
    - id: or_mark_avoid_shop
      action_id: mark_avoid_shop
      label: "危険な店舗をマークする"
      requires_discoveries:
        - unsafe_route_identified
      opportunity_kind: standard
    - id: or_move_low_profile
      action_id: move_low_profile
      label: "目立たないルートで移動する"
      requires_discoveries:
        - unsafe_route_identified
      opportunity_kind: movement
      location_updates: true
  label_rules:
    - match:
        action: rest
        mode: FREEZE
        location: "情報源_夜の酒場"
      label: "酒場から家に帰る"
    - match:
        action: rest
        mode: FREEZE
        location: "拠点_安アパート"
      label: "仮眠をとる"
