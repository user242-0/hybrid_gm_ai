# config.yml（提案）
profile: prod  # prod | lab

datalab:
  emit_scene_graph: true
  emit_policy: always # always | threshold | policy
  job_dir_pattern: "jobs/%Y%m%d_quick"
  # Optional explicit job directory override. When set, this path is used
  # instead of the dated pattern above (useful when re-running tests against
  # a specific captured job).
  # job_dir: "jobs/20240101_quick"
  emit_thresholds:
    salience_min: 0.60
    red_impulse_min: 0.50
  # SceneGraph/emotion_eval/seedledger の出力制御
  emit_sources: ["GUI", "HUD", "CLI", ]          # SceneGraph と emotion_eval の出力元（default）
  emit_exclude_actions: ["switch_character"]    # SceneGraph と emotion_eval から除外する action_id（default）
  seedledger_enabled: true                      # seedledger の出力を有効化（default: true）
  seedledger_sources: ["GUI", "HUD", "CLI" ]     # seedledger の出力元（default: emit_sources と揃える）
  emotion_eval_sources: ["GUI", "HUD", "CLI"]   # emotion_eval の出力元（default: emit_sources と揃える）

director:
  enabled: true
  seed: 41
  premise_path: "data/director/premise.yml"

rc:
  # RC側が選択候補から除外するアクション（プレイヤーは選べる）
  excluded_actions:
    - switch_character
    - set_emotion
  # レバーA: RC意思決定の最短間隔（秒）
  decision_interval_sec: 1.0
  # レバーB: 入力待ち中にRCが進められる累積時間の上限（ゲーム内分）
  max_advance_minutes_while_input_pending: 10

llm:
  # LLM呼び出しモード: off | player_only | rc_only | all
  mode: off
  # LLM呼び出しを許可するアクション（空=全て許可）
  allow_actions:
    - talk_to_statue
    - generate_flavor
  # レート制限
  rate_limit:
    calls_per_minute: 6
    calls_per_turn: 1
  # 拒否時にフォールバックテンプレを使う
  fallback_template: true

ro:
  # RO (Reversible Operator) の有効化
  enabled: true
  # playerログの直近何行を読むか
  log_window: 50

logging:
  # full ログの出力を有効化（default: false）
  full_enabled: false
  # full ログから除外する action_id のリスト（default: ["switch_character"]）
  # 空リスト [] にすると除外しない（全アクションを出力）
  full_exclude_actions: []